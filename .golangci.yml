version: "2"

run:
  tests: true
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - unused
    - errcheck
    - revive
    - misspell
    - unparam
    - gocyclo
    - paralleltest
    - godoclint
    - godot
    - godox
    - dogsled
    - bodyclose
    - testpackage
  settings:
    gocyclo:
      min-complexity: 15
    revive:
      rules:
        - name: exported
          severity: warning
          disabled: false
        - name: package-comments
          severity: warning
          disabled: false
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - unparam

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports

output:
  formats:
    text:
      path: stdout
      colors: true
      print-issued-lines: true
      print-linter-name: true
