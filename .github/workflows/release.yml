name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x .github/scripts/*.sh

      - name: Validate version format
        run: .github/scripts/release/validate_version.sh "${{ inputs.version }}"

      - name: Check if tag exists
        run: .github/scripts/release/check_tag_exists.sh "${{ inputs.version }}"

      - name: Extract changelog for version
        run: .github/scripts/release/extract_changelog.sh "${{ inputs.version }}" /tmp/release_notes.md

      - name: Create git tag
        run: .github/scripts/release/create_tag.sh "${{ inputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: .github/scripts/release/create_release.sh "${{ inputs.version }}" /tmp/release_notes.md
