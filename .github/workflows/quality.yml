name: Quality

on:
  pull_request:

jobs:
  go-guard:
    uses: ./.github/workflows/go_guard.yml

  linter:
    needs: go-guard
    if: needs.go-guard.outputs.go_mod_exists == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.4'
          cache: true
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b $(go env GOPATH)/bin v2.8.0
          echo "PATH=$(go env GOPATH)/bin:$PATH" >> $GITHUB_ENV
      - name: Run linter
        run: |
          make lint